<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <style>
        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            color: #2d3436;
        }

        h1 { margin-bottom: 5px; font-weight: 800; color: #2c3e50; }
        p { margin-top: 0; color: #7f8c8d; font-size: 1rem; margin-bottom: 25px; }

        #flashcard {
            background-color: white;
            border-radius: 20px;
            width: 90%;
            max-width: 400px;
            height: 350px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            box-shadow: 0 15px 30px rgba(0,0,0,0.1);
            margin-bottom: 30px;
            padding: 20px;
            box-sizing: border-box;
            border: 4px solid #fff;
        }

        #emoji-display {
            font-size: 120px;
            margin-bottom: 20px;
            user-select: none;
            filter: drop-shadow(0 5px 10px rgba(0,0,0,0.1));
        }

        #name-display {
            font-size: 32px;
            font-weight: 800;
            color: #2980b9;
            min-height: 45px;
            text-align: center;
            transition: opacity 0.2s ease;
        }

        .hidden {
            opacity: 0 !important;
            transition: none !important;
        }

        .controls { display: flex; gap: 15px; width: 90%; max-width: 400px; }

        button {
            flex: 1;
            padding: 18px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            border: none;
            border-radius: 12px;
            transition: all 0.2s;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        button:active { transform: translateY(2px); }

        #reveal-btn { background-color: #3498db; color: white; }
        #next-btn { background-color: #27ae60; color: white; }

        #counter {
            margin-top: 20px;
            font-size: 14px;
            color: #576574;
            font-weight: 600;
            background: rgba(255,255,255,0.5);
            padding: 5px 15px;
            border-radius: 20px;
        }
    </style>
</head>

        let flashcards = [];
        let currentIndex = 0;

        const emojiDisplay = document.getElementById('emoji-display');
        const nameDisplay = document.getElementById('name-display');
        const revealBtn = document.getElementById('reveal-btn');
        const nextBtn = document.getElementById('next-btn');
        const counter = document.getElementById('counter');

        function initGame() {
            flashcards = [...flagLibrary].sort(() => Math.random() - 0.5);
            currentIndex = 0;
            loadCard();
        }

        function loadCard() {
            nameDisplay.classList.add('hidden');
            nameDisplay.textContent = ""; 
            
            setTimeout(() => {
                const currentCard = flashcards[currentIndex];
                emojiDisplay.textContent = currentCard.emoji;
                nameDisplay.textContent = currentCard.name;
                counter.textContent = `Flag ${currentIndex + 1} of ${flashcards.length}`;
            }, 60); 
        }

        revealBtn.addEventListener('click', () => {
            nameDisplay.classList.remove('hidden');
        });

        nextBtn.addEventListener('click', () => {
            currentIndex = (currentIndex + 1) % flashcards.length;
            loadCard();
        });

        initGame();
    </script>

</html>
